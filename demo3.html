<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TK Chou · 緩步的探險者</title>
<style>
  :root {
    --bg: #efe9dd;
    --ink: #232220;
    --tag-border: rgba(35, 34, 32, 0.55);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
    --spin: 48s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
  }

  /* ===== Orbit : wrapper handles open/close, ring handles spin ===== */
  .orbit {
    position: absolute;
    inset: 0;
    z-index: 2;
    opacity: 0;
    transform: scale(.2);
    pointer-events: none;
    transition: transform .6s cubic-bezier(.2,.85,.25,1), opacity .5s ease;
  }
  .stage.open .orbit { opacity: 1; transform: scale(1); pointer-events: auto; }

  .ring {
    position: absolute;
    inset: 0;
    animation: spin var(--spin) linear infinite;
    transform-origin: 50% 50%;
  }
  .stage:not(.open) .ring { animation-play-state: paused; }

  .item {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) translate(var(--ox, 0px), var(--oy, 0px));
    text-decoration: none;
    color: var(--ink);
  }

  /* counter-rotates so the icon + label always stay upright */
  .counter {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: spin var(--spin) linear infinite reverse;
    transition: transform .3s ease;
  }
  .stage:not(.open) .counter { animation-play-state: paused; }

  .item:hover { z-index: 5; }
  .item:hover .counter { transform: scale(1.1); }
  .orbit:hover .ring,
  .orbit:hover .counter { animation-play-state: paused; }

  .item .art {
    font-size: 60px;
    line-height: 1;
    filter: drop-shadow(0 22px 16px rgba(60, 50, 35, 0.22));
    user-select: none;
  }
  .item .tag {
    font-size: 11px;
    letter-spacing: .02em;
    text-align: center;
    border: 1px solid var(--tag-border);
    border-radius: 999px;
    padding: 4px 11px;
    white-space: nowrap;
    background: rgba(247,243,234,.65);
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ===== Center figure : Brock (sits above the orbit) ===== */
  .hero {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 4;
  }
  .hero .person {
    width: 168px;
    height: auto;
    image-rendering: pixelated;
    display: block;
    filter: drop-shadow(0 34px 26px rgba(60, 50, 35, 0.28));
    user-select: none;
  }
  .stack-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f7f3ea;
    border: 1px solid rgba(35,34,32,.18);
    border-radius: 999px;
    padding: 6px 7px 6px 14px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    font-family: var(--mono);
    box-shadow: 0 4px 14px rgba(60,50,35,.12);
    transition: transform .25s ease, background .25s ease;
  }
  .stack-pill:hover { transform: translateY(-1px); background: #fffdf8; }
  .stack-pill .plus {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .stage.open .stack-pill .plus { transform: rotate(45deg); }

  /* ===== Intro : name + bilingual positioning (the 10-second pitch) ===== */
  .intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    max-width: min(340px, 82vw);
    text-align: center;
    transition: opacity .5s ease;
  }
  .stage.open .intro { opacity: .25; }
  .intro .name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .intro .tagline {
    font-size: clamp(11.5px, 1.4vw, 13px);
    line-height: 1.55;
    color: rgba(35, 34, 32, 0.74);
  }
  .intro .tagline.en {
    font-size: clamp(10.5px, 1.2vw, 11.5px);
    color: rgba(35, 34, 32, 0.5);
    font-style: italic;
  }

  .hint {
    position: absolute;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: .04em;
    color: rgba(35,34,32,.45);
    z-index: 6;
  }

  @media (prefers-reduced-motion: reduce) {
    .ring, .counter { animation: none !important; }
  }

  @media (max-width: 820px) {
    .hero .person { width: 120px; }
    .item .art { font-size: 48px; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <div class="orbit">
      <div class="ring" id="ring"></div>
    </div>

    <div class="hero">
      <img class="person" alt="Brock" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAFAAAABQCAMAAAC5zwKfAAAAMFBMVEUBAAAAAAAsOyU7LCViLBliSjNiM0KEakKpYkrYajvPjWL2xan///9ijVI7akqyQgPb/fWDAAAAAXRSTlMAQObYZgAAAh5JREFUeNrt14lq4zAUhWEdbdESS+//tnOudQ2dsIzRDTAU/8hpgPL1VGGL+y96enp6SokvIXxLCy69ggt8voNSC68XT0JIcPZIrVJIdjClpKBEMFhBlXjkYVYx6DQeLZgXKhbWK2D0aKzTwzc+lSCjiPEsMAW7KBhP6qecYAZL6izJUzrsXmqNUAkhC+iMASnT6lcFzhpya61rHAxmVCkW3ReAWGudEV8A+eQWK0E+0yyGQI9viMmZFcZ75ELwMiHrCFpFByDSSwQnQcYfFlDuLoIpKCJMXqUoZJwiro3RAJ6iUBBQRs5ZDdfIXeKcpIpT/sCuqMRF6hsZbQBpLEm31jPsgWsUsMjFrcLuDYrn2JpXp3oY2AEzDQFV732JERhjwAiW0k+Q2nF4P4bfAeuEerlLLWIcbBwUseHVOS+wiNfyoMS2warempjp6UKK2PEUlHwrMvAwgrg4PzJb4BItoDhD+glavEHiQ7SAQwkFVRzY8OKHp+BqB4R6q9Pzfg/Mc66B/vgLhMOheXe/Ukqus+LT84Bz8CfHife51nvLMnBcmGcAxvgh4q7XWxcRcH7otOsGF0heRH93X889Z4LyD4+lXZ4nKOLw9z+W3AhOvugNKqcgNsCeZ57c6AgOxdQDkoLice098T0lOAavmHgeKSno2V3P4f1WUAIUBeDkYRHytQhw98W3eheqkob1je0mqMC/foG5p6enp1/THxzsKSe2XzsHAAAAAElFTkSuQmCC" />
      <div class="intro">
        <span class="name">TK Chou</span>
        <span class="tagline zh">非理科出身，卻停不下來地用程式把生活的小麻煩變成小工具。</span>
        <span class="tagline en">Not a tech major, but can't stop turning life's small annoyances into little tools.</span>
      </div>
      <button class="stack-pill" id="toggle" type="button" aria-expanded="false">TK's Stack <span class="plus">+</span></button>
    </div>

    <p class="hint" id="hint">點一下「＋」展開 · Tap + to explore</p>
  </main>

  <script>
    /* =========================================================
       作品集設定清單 — 想新增 / 刪除作品，只要改這個陣列即可。
       icon 用 emoji，title 是標題，url 是要連到的外部網址。
       ========================================================= */
    const PORTFOLIO = [
      { icon: "💼", title: "LinkedIn", url: "https://www.linkedin.com/in/takangchou/" },
      { icon: "🐙", title: "GitHub",   url: "https://github.com/bagayellowai2025-cyber" },
      // ↓↓ 以下為範例欄位（Phase 2 會換成你的精選專案），可自行替換或刪除 ↓↓
      { icon: "✉️", title: "Email",     url: "#" },
      { icon: "📝", title: "Blog",      url: "#" },
      { icon: "🎨", title: "Portfolio", url: "#" },
    ];

    (function () {
      const stage  = document.getElementById('stage');
      const ring   = document.getElementById('ring');
      const toggle = document.getElementById('toggle');
      const hint   = document.getElementById('hint');

      const n = PORTFOLIO.length;
      const radius = Math.min(window.innerWidth, window.innerHeight) * 0.33;

      PORTFOLIO.forEach(function (p, i) {
        const a = document.createElement('a');
        a.className = 'item';
        a.href = p.url;
        if (p.url && p.url !== '#') { a.target = '_blank'; a.rel = 'noopener'; }

        const angle = (-90 + i * (360 / n)) * Math.PI / 180;
        a.style.setProperty('--ox', (Math.cos(angle) * radius).toFixed(1) + 'px');
        a.style.setProperty('--oy', (Math.sin(angle) * radius).toFixed(1) + 'px');

        a.innerHTML =
          '<span class="counter"><span class="art" aria-hidden="true">' + p.icon +
          '</span><span class="tag">' + p.title + '</span></span>';
        ring.appendChild(a);
      });

      toggle.addEventListener('click', function () {
        const open = stage.classList.toggle('open');
        toggle.setAttribute('aria-expanded', String(open));
        hint.textContent = open ? '點圖示前往 · 再點一次收合 · Tap an icon, or + to close' : '點一下「＋」展開 · Tap + to explore';
      });
    })();
  </script>
</body>
</html>
