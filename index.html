<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TK's Stack</title>
<style>
  :root {
    --bg: #efe9dd;
    --ink: #232220;
    --tag-border: rgba(35, 34, 32, 0.55);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== Parallax scroll track : gives the sticky stage room to animate ===== */
  .parallax {
    position: relative;
    height: 220vh;
  }

  /* ===== Stage : the scattered "stack" canvas (pinned while scrolling) ===== */
  .stage {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ===== A floating product ===== */
  .item {
    position: absolute;
    left: var(--x);
    top: var(--y);
    transform: translate(-50%, -50%) translate(var(--px, 0px), var(--py, 0px));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    animation: floaty var(--dur, 7s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    will-change: transform, opacity;
    z-index: 2;
  }

  .item .art {
    font-size: var(--size, 64px);
    line-height: 1;
    /* soft contact shadow on the ground */
    filter: drop-shadow(0 22px 16px rgba(60, 50, 35, 0.22));
    user-select: none;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
  }

  .item:hover { transform: translate(-50%, -50%) scale(1.06); z-index: 5; }
  .item:hover .art { transform: translateY(-4px); }

  /* the pill label */
  .tag {
    font-size: 11px;
    letter-spacing: .02em;
    line-height: 1.25;
    text-align: center;
    color: var(--ink);
    border: 1px solid var(--tag-border);
    border-radius: 999px;
    padding: 4px 11px;
    white-space: nowrap;
    background: transparent;
  }

  /* ===== Center figure : the person ===== */
  .hero {
    position: absolute;
    left: 50%;
    top: 49%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 4;
  }

  .hero .person {
    width: 168px;
    height: auto;
    image-rendering: pixelated;
    display: block;
    filter: drop-shadow(0 34px 26px rgba(60, 50, 35, 0.28));
    user-select: none;
  }

  .hero .stack-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f7f3ea;
    border: 1px solid rgba(35,34,32,.18);
    border-radius: 999px;
    padding: 6px 7px 6px 14px;
    font-size: 12.5px;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(60,50,35,.12);
  }

  .hero .stack-pill .plus {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
  }

  /* ===== Create your stack CTA ===== */
  .cta {
    position: absolute;
    left: 51%;
    top: 88%;
    transform: translate(-50%, -50%);
    z-index: 6;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--ink);
    padding: 18px 52px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.32);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(60, 50, 35, 0.10), inset 0 0 0 1px rgba(255,255,255,.35);
    transition: transform .3s ease, background .3s ease;
  }
  .cta:hover { transform: translate(-50%, -50%) scale(1.04); background: rgba(255,255,255,.5); }

  @keyframes floaty {
    0%, 100% { transform: translate(-50%, -50%) translate(var(--px, 0px), var(--py, 0px)); }
    50%      { transform: translate(-50%, -50%) translate(var(--px, 0px), calc(var(--py, 0px) - 10px)); }
  }
  .item:hover { animation-play-state: paused; }

  /* ===== Outro : the payoff revealed at the end of the scroll ===== */
  .outro {
    position: relative;
    z-index: 1;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
    padding: 80px 24px 100px;
    background: linear-gradient(180deg, var(--bg), #e6dccb);
  }
  .outro h2 {
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  .outro p {
    max-width: 480px;
    font-size: 14px;
    line-height: 1.7;
    color: rgba(35, 34, 32, 0.7);
  }
  .outro .stack-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f7f3ea;
    border: 1px solid rgba(35,34,32,.18);
    border-radius: 999px;
    padding: 6px 7px 6px 14px;
    font-size: 12.5px;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(60,50,35,.12);
    margin-top: 6px;
  }
  .outro .stack-pill .plus {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    .item { animation: none; }
    .item, .hero, .cta { transform: translate(-50%, -50%) !important; }
  }

  /* ============ Mobile / RWD ============ */
  @media (max-width: 820px) {
    body { overflow-y: auto; }
    .parallax { height: auto; }
    .stage { position: static; height: auto; min-height: 100dvh; padding: 40px 16px 120px; }
    /* parallax offsets are disabled on mobile */
    .item { --px: 0px !important; --py: 0px !important; }

    /* center figure goes to the top as a hero */
    .hero {
      position: static;
      transform: none;
      width: 100%;
      margin: 8px auto 36px;
    }
    .hero .person { width: 120px; }

    /* products reflow into a responsive grid */
    .item {
      position: static !important;
      transform: none !important;
      animation: none;
      width: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px 14px;
      max-width: 520px;
      margin: 0 auto;
    }
    .item .art { font-size: 60px; }
    .item:hover { transform: none; }
    .item:hover .art { transform: translateY(-4px); }

    /* CTA pinned to bottom */
    .cta {
      position: fixed;
      left: 50%;
      top: auto;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: 15px;
      padding: 16px 44px;
      background: rgba(247,243,234,.78);
    }
    .cta:hover { transform: translateX(-50%) scale(1.03); }
  }

  @media (max-width: 380px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 24px 10px; }
    .item .art { font-size: 50px; }
  }
</style>
</head>

    <span class="stack-pill">TK's Stack <span class="plus">+</span></span>
  </section>

  <script>
    (function () {
      const desktop = window.matchMedia('(min-width: 821px)');
      const reduce = window.matchMedia('(prefers-reduced-motion: reduce)');

      const track = document.querySelector('.parallax');
      const items = Array.from(document.querySelectorAll('.item'));
      const hero = document.querySelector('.hero');
      const cta = document.querySelector('.cta');

      // Give each item a depth-based parallax speed (bigger art = "closer" = moves more).
      items.forEach(function (el, i) {
        const size = parseFloat(getComputedStyle(el).getPropertyValue('--size')) || 68;
        const depth = Math.min(Math.max((size - 64) / 12, 0), 1); // 0..1
        el.dataset.speedY = (0.45 + depth * 0.85).toFixed(3);     // vertical drift
        el.dataset.dir = (i % 2 === 0 ? -1 : 1);                  // alternate up/down
        el.dataset.speedX = (((i % 3) - 1) * 0.10).toFixed(3);    // gentle sideways drift
      });

      const clamp = function (v, lo, hi) { return Math.min(Math.max(v, lo), hi); };
      let ticking = false;

      function render() {
        ticking = false;
        if (!desktop.matches || reduce.matches) return;

        const range = track.offsetHeight - window.innerHeight;
        const p = range > 0 ? clamp(window.scrollY / range, 0, 1) : 0;

        items.forEach(function (el) {
          const speedY = parseFloat(el.dataset.speedY);
          const dir = parseFloat(el.dataset.dir);
          const speedX = parseFloat(el.dataset.speedX);
          const ty = p * (70 + speedY * 240) * dir;
          const tx = p * speedX * 200;
          el.style.setProperty('--py', ty.toFixed(1) + 'px');
          el.style.setProperty('--px', tx.toFixed(1) + 'px');
          el.style.opacity = (1 - p * 0.95).toFixed(3);
        });

        if (hero) {
          hero.style.transform =
            'translate(-50%, -50%) translateY(' + (-p * 60).toFixed(1) + 'px) scale(' + (1 - p * 0.16).toFixed(3) + ')';
          hero.style.opacity = (1 - p * 0.85).toFixed(3);
        }
        if (cta) {
          cta.style.transform = 'translate(-50%, -50%) translateY(' + (-p * 110).toFixed(1) + 'px)';
          cta.style.opacity = (1 - p * 1.1).toFixed(3);
        }
      }

      function onScroll() {
        if (!ticking) {
          ticking = true;
          requestAnimationFrame(render);
        }
      }

      function reset() {
        items.forEach(function (el) {
          el.style.removeProperty('--py');
          el.style.removeProperty('--px');
          el.style.opacity = '';
        });
        if (hero) { hero.style.transform = ''; hero.style.opacity = ''; }
        if (cta) { cta.style.transform = ''; cta.style.opacity = ''; }
      }

      function setup() {
        if (desktop.matches && !reduce.matches) {
          render();
        } else {
          reset();
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', setup);
      if (desktop.addEventListener) desktop.addEventListener('change', setup);
      setup();
    })();
  </script>
