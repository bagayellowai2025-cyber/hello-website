<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sam's Stack</title>
<style>
  :root {
    --bg: #efe9dd;
    --ink: #232220;
    --tag-border: rgba(35, 34, 32, 0.55);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ===== Stage : the scattered "stack" canvas ===== */
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ===== A floating product ===== */
  .item {
    position: absolute;
    left: var(--x);
    top: var(--y);
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    animation: floaty var(--dur, 7s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    z-index: 2;
  }

  .item .art {
    font-size: var(--size, 64px);
    line-height: 1;
    /* soft contact shadow on the ground */
    filter: drop-shadow(0 22px 16px rgba(60, 50, 35, 0.22));
    user-select: none;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
  }

  .item:hover { transform: translate(-50%, -50%) scale(1.06); z-index: 5; }
  .item:hover .art { transform: translateY(-4px); }

  /* the pill label */
  .tag {
    font-size: 11px;
    letter-spacing: .02em;
    line-height: 1.25;
    text-align: center;
    color: var(--ink);
    border: 1px solid var(--tag-border);
    border-radius: 999px;
    padding: 4px 11px;
    white-space: nowrap;
    background: transparent;
  }

  /* ===== Center figure : the person ===== */
  .hero {
    position: absolute;
    left: 50%;
    top: 49%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    z-index: 4;
  }

  .hero .person {
    font-size: 168px;
    line-height: 1;
    filter: drop-shadow(0 34px 26px rgba(60, 50, 35, 0.28));
    user-select: none;
  }

  .hero .stack-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f7f3ea;
    border: 1px solid rgba(35,34,32,.18);
    border-radius: 999px;
    padding: 6px 7px 6px 14px;
    font-size: 12.5px;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(60,50,35,.12);
  }

  .hero .stack-pill .plus {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
  }

  /* ===== Create your stack CTA ===== */
  .cta {
    position: absolute;
    left: 51%;
    top: 88%;
    transform: translate(-50%, -50%);
    z-index: 6;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--ink);
    padding: 18px 52px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.32);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(60, 50, 35, 0.10), inset 0 0 0 1px rgba(255,255,255,.35);
    transition: transform .3s ease, background .3s ease;
  }
  .cta:hover { transform: translate(-50%, -50%) scale(1.04); background: rgba(255,255,255,.5); }

  @keyframes floaty {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50%      { transform: translate(-50%, -50%) translateY(-10px); }
  }
  .item:hover { animation-play-state: paused; }

  @media (prefers-reduced-motion: reduce) {
    .item { animation: none; }
  }

  /* ============ Mobile / RWD ============ */
  @media (max-width: 820px) {
    body { overflow-y: auto; }
    .stage { height: auto; min-height: 100dvh; padding: 40px 16px 120px; }

    /* center figure goes to the top as a hero */
    .hero {
      position: static;
      transform: none;
      width: 100%;
      margin: 8px auto 36px;
    }
    .hero .person { font-size: 120px; }

    /* products reflow into a responsive grid */
    .item {
      position: static !important;
      transform: none !important;
      animation: none;
      width: 100%;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px 14px;
      max-width: 520px;
      margin: 0 auto;
    }
    .item .art { font-size: 60px; }
    .item:hover { transform: none; }
    .item:hover .art { transform: translateY(-4px); }

    /* CTA pinned to bottom */
    .cta {
      position: fixed;
      left: 50%;
      top: auto;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: 15px;
      padding: 16px 44px;
      background: rgba(247,243,234,.78);
    }
    .cta:hover { transform: translateX(-50%) scale(1.03); }
  }

  @media (max-width: 380px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 24px 10px; }
    .item .art { font-size: 50px; }
  }
</style>
</head>
<body>
  <main class="stage">

    <!-- Center figure -->
    <div class="hero">
      <div class="person" aria-hidden="true">🧍🏻‍♂️</div>
      <span class="stack-pill">Sam's Stack <span class="plus">+</span></span>
    </div>

    <!-- Scattered products -->
    <div class="grid">
      <figure class="item" style="--x:14%; --y:34%; --size:74px; --dur:8s; --delay:.0s;">
        <span class="art" aria-hidden="true">💻</span>
        <figcaption class="tag">MacBook Pro</figcaption>
      </figure>

      <figure class="item" style="--x:34%; --y:23%; --size:70px; --dur:7.2s; --delay:.6s;">
        <span class="art" aria-hidden="true">☕️</span>
        <figcaption class="tag">Espresso Maker</figcaption>
      </figure>

      <figure class="item" style="--x:80%; --y:14%; --size:72px; --dur:9s; --delay:.3s;">
        <span class="art" aria-hidden="true">🏎️</span>
        <figcaption class="tag">Lego Porsche</figcaption>
      </figure>

      <figure class="item" style="--x:64%; --y:29%; --size:70px; --dur:7.8s; --delay:1.1s;">
        <span class="art" aria-hidden="true">🥿</span>
        <figcaption class="tag">Birkenstock Boston</figcaption>
      </figure>

      <figure class="item" style="--x:92%; --y:43%; --size:72px; --dur:8.4s; --delay:.2s;">
        <span class="art" aria-hidden="true">🧥</span>
        <figcaption class="tag">Knitted Jumper</figcaption>
      </figure>

      <figure class="item" style="--x:26%; --y:59%; --size:66px; --dur:7.6s; --delay:.9s;">
        <span class="art" aria-hidden="true">🧋</span>
        <figcaption class="tag">Iced Americano</figcaption>
      </figure>

      <figure class="item" style="--x:7%; --y:58%; --size:66px; --dur:8.2s; --delay:1.4s;">
        <span class="art" aria-hidden="true">👕</span>
        <figcaption class="tag">Black T-Shirt</figcaption>
      </figure>

      <figure class="item" style="--x:69%; --y:63%; --size:68px; --dur:7.4s; --delay:.5s;">
        <span class="art" aria-hidden="true">🧴</span>
        <figcaption class="tag">Diptyque Tam Dao</figcaption>
      </figure>

      <figure class="item" style="--x:84%; --y:79%; --size:68px; --dur:8.6s; --delay:1.0s;">
        <span class="art" aria-hidden="true">🍶</span>
        <figcaption class="tag">Vitamix</figcaption>
      </figure>

      <figure class="item" style="--x:39%; --y:81%; --size:64px; --dur:7.0s; --delay:.7s;">
        <span class="art" aria-hidden="true">📗</span>
        <figcaption class="tag">The Inner Game<br>of Tennis</figcaption>
      </figure>

      <figure class="item" style="--x:15%; --y:86%; --size:70px; --dur:8.8s; --delay:.4s;">
        <span class="art" aria-hidden="true">👟</span>
        <figcaption class="tag">Asics Gel-Kayano</figcaption>
      </figure>
    </div>

    <!-- CTA -->
    <button class="cta" type="button">Create your stack</button>

  </main>
</body>
</html>
